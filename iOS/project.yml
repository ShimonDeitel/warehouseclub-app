name: Warehouseclub
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Warehouseclub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Warehouseclub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warehouseclub
        INFOPLIST_FILE: Warehouseclub/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Warehouseclub"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: Warehouseclub/Info.plist
      properties:
        CFBundleDisplayName: "Warehouseclub"
        ITSAppUsesNonExemptEncryption: false
  WarehouseclubTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WarehouseclubTests
    dependencies:
      - target: Warehouseclub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warehouseclub.tests
  WarehouseclubUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WarehouseclubUITests
    dependencies:
      - target: Warehouseclub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warehouseclub.uitests
schemes:
  Warehouseclub:
    build:
      targets:
        Warehouseclub: all
    test:
      targets:
        - WarehouseclubTests
        - WarehouseclubUITests
    run:
      config: Debug
