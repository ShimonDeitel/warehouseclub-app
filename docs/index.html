<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warehouseclub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#160f0c; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .wrap { max-width:640px; padding:48px 24px; text-align:center; }
  h1 { color:#bf4733; font-size:2.4rem; margin-bottom:8px; }
  p.tag { color:#b8b8b8; font-size:1.1rem; margin-bottom:32px; }
  .feature { background:rgba(255,255,255,0.05); border-radius:14px; padding:20px; margin-bottom:16px; text-align:left; }
  .feature h3 { margin:0 0 6px 0; color:#bf4733; }
  .feature p { margin:0; color:#cfcfcf; }
  footer { margin-top:40px; font-size:0.85rem; color:#888; }
  a { color:#bf4733; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #bf473355 0%, #bf473300 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Warehouseclub</h1>
  <p class="tag">Track whether your warehouse club or bulk-store membership is actually saving you money.</p>
  <div class="feature"><h3>Free</h3><p>Log membership fee plus savings per trip</p></div>
  <div class="feature"><h3>Warehouseclub Pro</h3><p>Break-even calculator and annual savings report</p></div>
  <footer>
    <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
    Contact: s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
